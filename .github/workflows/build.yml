name: Build SwiftSword IPA

on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone Cyanide (base Xcode project)
        run: |
          git clone --depth=1 https://github.com/zeroxjf/cyanide.git base
          echo "Cyanide cloned"

      - name: Verify Cyanide builds
        run: |
          cd base
          xcodebuild -project Cyanide.xcodeproj -scheme Cyanide \
            -sdk iphoneos -configuration Release \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO -derivedDataPath build build 2>&1 | tail -5
          echo "Cyanide base builds OK"

      - name: Replace with SwiftSword source
        run: |
          # Remove Cyanide app source, keep kexploit framework
          rm -f base/Cyanide/*.m base/Cyanide/*.h
          rm -rf base/Cyanide/Assets.xcassets

          # Copy our source files
          cp SwiftSword/*.m base/Cyanide/
          cp SwiftSword/*.h base/Cyanide/
          cp SwiftSword/*.plist base/Cyanide/

          # Copy exploit & payload modules
          mkdir -p base/Cyanide/Exploit base/Cyanide/Payload
          cp SwiftSword/Exploit/*.m base/Cyanide/Exploit/
          cp SwiftSword/Exploit/*.h base/Cyanide/Exploit/
          cp SwiftSword/Payload/*.m base/Cyanide/Payload/
          cp SwiftSword/Payload/*.h base/Cyanide/Payload/

          echo "Source injected"
          ls base/Cyanide/

      - name: Build IPA
        run: |
          cd base
          xcodebuild \
            -project Cyanide.xcodeproj \
            -scheme Cyanide \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build_output" \
            2>&1 | tail -15
          echo "Build exit: $?"

      - name: Package IPA
        run: |
          APP=$(find base/build_output -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            APP=$(find base/build -name "Cyanide.app" -type d | head -1)
          fi
          if [ -z "$APP" ]; then
            echo "FAILED: .app not found"
            find base -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "Found: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r "$GITHUB_WORKSPACE/SwiftSword_iOS26.ipa" Payload/
          ls -lh "$GITHUB_WORKSPACE/SwiftSword_iOS26.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: SwiftSword_iOS26
          path: SwiftSword_iOS26.ipa
          retention-days: 7
