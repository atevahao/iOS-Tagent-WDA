name: Build Exploit IPA

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone base project (zeroxjf CVE-2026-20687)
        run: |
          git clone --depth=1 https://github.com/zeroxjf/CVE-2026-20687-AppleJPEGDriver-UAF.git base
          echo "Base project cloned"

      - name: Verify base project compiles
        run: |
          cd base/ios-app
          xcodebuild -project Test.xcodeproj -scheme Test -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath ../../derived build 2>&1 | tail -10

      - name: Copy exploit files into project
        run: |
          cp exploit/applejpeg_krw.h base/ios-app/Test/
          cp exploit/applejpeg_krw.m base/ios-app/Test/
          cp exploit/collector.h base/ios-app/Test/
          cp exploit/collector.m base/ios-app/Test/
          echo "Exploit files copied"

      - name: Patch Xcode project
        run: |
          python3 scripts/patch_pbxproj.py base/ios-app/Test.xcodeproj/project.pbxproj

      - name: Build IPA
        run: |
          cd base/ios-app
          xcodebuild archive \
            -project Test.xcodeproj \
            -scheme Test \
            -archivePath /tmp/archive \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO 2>&1 | tail -15
          echo "Build exit code: $?"

      - name: Package IPA
        run: |
          if [ -d "/tmp/archive.xcarchive/Products/Applications/Test.app" ]; then
            APP="/tmp/archive.xcarchive/Products/Applications/Test.app"
          elif [ -d "/tmp/archive/Products/Applications/Test.app" ]; then
            APP="/tmp/archive/Products/Applications/Test.app"
          else
            echo "Cannot find .app bundle"
            find /tmp/archive* -name "*.app" 2>/dev/null
            exit 1
          fi
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r exploit_A14_iOS26.ipa Payload/
          ls -lh exploit_A14_iOS26.ipa
          cp exploit_A14_iOS26.ipa $GITHUB_WORKSPACE/

      - uses: actions/upload-artifact@v4
        with:
          name: exploit_A14_iOS26
          path: exploit_A14_iOS26.ipa
          retention-days: 7
